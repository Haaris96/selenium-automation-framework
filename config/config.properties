# ============================================================
#  Application Configuration - Environment: QA
# ============================================================

# --- Base URLs ---
qa.url=https://www.saucedemo.com
staging.url=https://staging.saucedemo.com
prod.url=https://www.saucedemo.com

# --- Active Environment (overridden by -Denv Maven param) ---
env=qa

# --- Browser Configuration ---
browser=chrome
headless=false
browser.maximize=true
implicitly.wait=10
explicit.wait=20
page.load.timeout=30
script.timeout=15

# --- Test Credentials ---
username=standard_user
password=secret_sauce
invalid.username=locked_out_user
invalid.password=wrong_password

# --- Database Configuration ---
db.url=jdbc:mysql://localhost:3306/testdb
db.username=root
db.password=root
db.driver=com.mysql.cj.jdbc.Driver

# --- Reporting ---
reports.path=reports/
screenshots.path=screenshots/
logs.path=logs/
extent.report.name=Test Execution Report
extent.report.title=Selenium Automation Framework

# --- Parallel Execution ---
parallel.thread.count=4

# --- Retry ---
retry.count=1

# --- Excel Test Data ---
excel.path=testdata/testdata.xlsx
excel.sheet.login=LoginData
excel.sheet.products=ProductData
