# ExtentReports Cucumber7 Adapter configuration
extent.reporter.spark.start=true
extent.reporter.spark.out=reports/ExtentReport.html

# Report settings
extent.reporter.spark.vieworder=dashboard,test,author,device,exception,log,category

# Screenshot attachment
screenshot.dir=screenshots/
screenshot.rel.path=../screenshots/

# Offline mode (bundles resources locally — better for CI/Jenkins)
basefolder.name=reports/SparkReport
basefolder.datetimepattern=d-MMM-YY HH-mm-ss
